# ── Terminal ──────────────────────────────────────────────────────────────
set -as terminal-features ',alacritty:clipboard,xterm-kitty:clipboard'
set -g allow-passthrough on

# ── Prefix ────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# ── Mouse ─────────────────────────────────────────────────────────────────
set -g mouse on

# Pane index matches window index
setw -g pane-base-index 1

# ── Pane navigation (prefix + vim keys) ───────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 2
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 2

# ── Pane navigation (Alt + vim, no prefix) ────────────────────────────────
bind -n M-m select-pane -L
bind -n M-, select-pane -D
bind -n M-. select-pane -U
bind -n M-/ select-pane -R

# ── Window switching (Alt, no prefix) ─────────────────────────────────────
bind -n M-M previous-window
bind -n M-< previous-window
bind -n M-> next-window
bind -n M-? next-window

# ── Splitting ─────────────────────────────────────────────────────────────
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"
bind | split-window -fh -c "#{pane_current_path}"

bind -n M-| split-window -h -c "#{pane_current_path}"
bind -n M-_ split-window -v -c "#{pane_current_path}"
bind -n M-C new-window

# ── Misc ──────────────────────────────────────────────────────────────────
bind -n C-l send-key C-l
unbind p
bind p paste-buffer

# ── Style ─────────────────────────────────────────────────────────────────
set -g mode-style bg=brightblack,fg=default
set -g automatic-rename on
